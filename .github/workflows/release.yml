name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            rid: win-x64
            artifact_name: Pebbles-win-x64.exe
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: Pebbles-linux-x64
          - os: macos-latest
            rid: osx-x64
            artifact_name: Pebbles-osx-x64
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Publish Native AOT
      run: |
        dotnet publish src/Pebbles/Pebbles.csproj `
          -c Release `
          -r ${{ matrix.rid }} `
          --self-contained `
          -p:PublishAot=true `
          -p:StripSymbols=true `
          -p:OptimizationPreference=Speed `
          -o ./publish
      shell: pwsh
    
    - name: Create release artifact
      run: |
        if ( "${{ matrix.os }}" -eq "windows-latest" ) {
          Compress-Archive -Path ./publish/Pebbles.exe -DestinationPath ./Pebbles-${{ matrix.rid }}.zip
        } else {
          cd ./publish && tar -czvf ../Pebbles-${{ matrix.rid }}.tar.gz Pebbles && cd ..
        }
      shell: pwsh
    
    - name: Upload release artifact
      uses: actions/upload-artifact@v4
      with:
        name: Pebbles-${{ matrix.rid }}
        path: |
          Pebbles-${{ matrix.rid }}.*
  
  create-release:
    runs-on: ubuntu-latest
    needs: publish
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts
    
    - name: Generate changelog
      id: changelog
      run: |
        echo "## Changes" > changelog.md
        echo "" >> changelog.md
        git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"- %s" >> changelog.md
        echo "" >> changelog.md
        echo "" >> changelog.md
        echo "## Contributors" >> changelog.md
        echo "" >> changelog.md
        git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"- %an" | sort -u >> changelog.md
      shell: bash
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./artifacts/**/*.zip
          ./artifacts/**/*.tar.gz
        body_path: ./changelog.md
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
